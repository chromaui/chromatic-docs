name: "Run tests"

on: push

jobs:
  vitest:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        name: Install pnpm
        with:
          cache: true
          run_install: false
      - name: Install dependencies
        run: pnpm install
      - name: Verify diagrams are in sync
        run: |
          pnpm diagrams
          git diff --exit-code src/images/diagrams \
            || (echo "::error::Committed diagram SVGs are out of sync with diagrams/*.mmd. Run 'pnpm diagrams' locally and commit." && exit 1)
      - name: Run Vitest
        run: pnpm run test:unit
